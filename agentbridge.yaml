server:
  host: "127.0.0.1"
  port: 9939

workspace:
  path: "./workspace"
  init_git: true

workflow:
  default_review_rounds: 6
  default_recipe: "spec-review-loop"

brain:
  provider: "claude"
  command: "claude"
  args: ["-p", "--output-format", "json", "--verbose"]
  timeout_seconds: 900
  model_hint: ""
  system_prompt_file: "./brain_system_prompt.md"
  max_context_messages: 50
  planning_style: "deterministic"

providers:
  claude:
    command: "claude"
    args: ["--dangerously-skip-permissions", "--output-format", "json", "--verbose"]
    timeout_seconds: 1800
    max_retries: 2
    working_dir: ""
    env:
      CLAUDE_CODE_MAX_TURNS: "50"

  codex:
    command: "codex"
    args: ["exec", "--full-auto"]
    timeout_seconds: 1800
    max_retries: 2
    working_dir: ""
    env: {}

team:
  - name: "spec-creator-claude"
    provider: "claude"
    role: "spec_creator"
    count: 1
    description: "Creates and refines technical specifications, implementation plans, acceptance criteria, and task breakdowns."

  - name: "reviewer-codex"
    provider: "codex"
    role: "reviewer"
    count: 1
    description: "Reviews specifications for clarity, consistency, missing edge cases, feasibility, and testability."

  - name: "reviewer-claude"
    provider: "claude"
    role: "reviewer"
    count: 1
    description: "Performs adversarial spec review from a second model perspective and challenges assumptions."

log:
  file: "./agentbridge.log"
  level: "info"
