<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AgentBridge v2</title>
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="shell">

    <div class="topbar">
      <span class="topbar-title">AgentBridge</span>
      <div class="topbar-item">
        <span id="connection-dot" class="topbar-dot"></span>
        <span id="connection-label">disconnected</span>
      </div>
      <div class="topbar-spacer"></div>
      <div class="topbar-item">
        <label>Workflow</label>
        <span id="brain-provider-label">deterministic</span>
      </div>
      <div class="topbar-item">
        <label>Workspace</label>
        <span id="workspace-path">unknown</span>
      </div>
    </div>

    <div id="goalbar" class="goalbar empty">
      <div class="goalbar-info">
        <span id="goal-title" class="goalbar-title">No active goal</span>
        <span id="goal-status" class="goalbar-status"></span>
      </div>
      <div class="goalbar-progress">
        <div class="progress-track">
          <div id="goal-progress-bar" class="progress-bar"></div>
        </div>
        <span id="goal-progress-label" class="progress-label">0 / 0</span>
      </div>
      <div class="goalbar-actions">
        <button id="start-goal" type="button" class="btn-sm hidden">Start</button>
        <button id="stop-goal" type="button" class="btn-sm hidden">Stop</button>
        <button id="resume-goal" type="button" class="btn-sm hidden">Resume</button>
        <button id="delete-goal" type="button" class="btn-danger btn-sm hidden">Delete</button>
      </div>
    </div>

    <nav class="tabbar">
      <button class="tab active" data-tab="overview">Overview</button>
      <button class="tab" data-tab="plan">Plan</button>
      <button class="tab" data-tab="tasks">Tasks <span id="tab-tasks-count" class="tab-count"></span></button>
      <button class="tab" data-tab="messages">Messages</button>
      <button class="tab" data-tab="workspace">Workspace</button>
      <button class="tab" data-tab="controls">Controls</button>
    </nav>

    <div class="tab-panels">

      <!-- Overview: Coordinator + Agents -->
      <div class="tab-panel active" data-tab="overview">
        <div class="section">
          <div class="section-header">
            <span class="section-title">Coordinator</span>
            <div class="section-actions">
              <span id="brain-trigger" class="tag tag-accent">workflow</span>
            </div>
          </div>
          <div class="brain-grid">
            <div class="brain-output">
              <div class="brain-meta">
                <span id="brain-invocations" class="muted" style="font-size:11px">deterministic workflow</span>
              </div>
              <p id="workflow-status" class="brain-status-line">No active workflow state.</p>
              <p id="brain-process" class="brain-status-line">No active worker process telemetry yet.</p>
              <pre id="brain-thinking">No active workflow guidance yet.</pre>
            </div>
            <div class="brain-output">
              <div class="section-header" style="margin-bottom:8px">
                <span class="section-title">Transitions</span>
              </div>
              <div id="brain-decisions" class="decision-list"></div>
            </div>
          </div>
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-title">Agents</span>
            <div class="section-actions">
              <select id="agent-filter" class="topbar-select">
                <option value="">All agents</option>
              </select>
            </div>
          </div>
          <div id="agents-list"></div>
        </div>
      </div>

      <!-- Plan -->
      <div class="tab-panel" data-tab="plan">
        <div class="section">
          <div class="section-header">
            <span class="section-title">Execution Plan</span>
            <div class="section-actions">
              <button id="toggle-plan-editor" type="button" class="btn-sm">Edit Plan</button>
            </div>
          </div>
          <div id="plan-editor" class="hidden">
            <form id="plan-form" class="form-grid" style="margin-bottom:12px">
              <textarea id="plan-input" rows="8" placeholder='{"phases":[...]}'></textarea>
              <button type="submit">Apply Plan Override</button>
            </form>
          </div>
          <div id="plan-view"></div>
        </div>
      </div>

      <!-- Tasks -->
      <div class="tab-panel" data-tab="tasks">
        <div class="section">
          <div class="section-header">
            <span class="section-title">Work Queue</span>
            <div class="section-actions">
              <button id="clear-tasks" type="button" class="btn-sm">Clear Finished</button>
            </div>
          </div>
          <div id="tasks-list"></div>
        </div>
      </div>

      <!-- Messages -->
      <div class="tab-panel" data-tab="messages">
        <div class="section">
          <div class="section-header">
            <span class="section-title">Timeline</span>
            <div class="section-actions">
              <input id="search-input" type="search" placeholder="Search..." style="width:200px">
              <button id="clear-messages" type="button" class="btn-sm">Clear</button>
            </div>
          </div>
          <div id="message-types" class="chip-bar"></div>
          <div id="message-list" class="timeline"></div>
        </div>
      </div>

      <!-- Workspace -->
      <div class="tab-panel" data-tab="workspace">
        <div class="section">
          <div class="section-header">
            <span class="section-title">File Tree</span>
            <div class="section-actions">
              <input id="workspace-upload-dir" type="text" placeholder="Target folder (optional)">
              <input id="workspace-upload-input" type="file" multiple>
              <button id="upload-workspace" type="button" class="btn-sm">Upload</button>
              <button id="refresh-workspace" type="button" class="btn-sm">Refresh</button>
            </div>
          </div>
          <div id="workspace-tree" class="workspace-tree"></div>
        </div>
      </div>

      <!-- Controls -->
      <div class="tab-panel" data-tab="controls">
        <div class="section">
          <div class="section-header">
            <span class="section-title">Submit Goal</span>
          </div>
          <form id="goal-form" class="form-grid" style="grid-template-columns:1fr">
            <input id="goal-input-title" type="text" placeholder="Goal title">
            <textarea id="goal-input-description" rows="3" placeholder="High-level outcome, constraints, or guidance"></textarea>
            <select id="goal-input-recipe">
              <option value="spec-review-loop">Parallel review + creator consolidation</option>
              <option value="spec-cross-critique-loop">Cross-critique review loop</option>
            </select>
            <input id="goal-input-review-rounds" type="number" min="1" step="1" placeholder="Review rounds override (optional)">
            <button type="submit">Submit Goal</button>
          </form>
        </div>

        <div class="section">
          <div class="section-header">
            <span class="section-title">Overrides</span>
          </div>
          <form id="composer-form" class="form-grid">
            <select id="send-mode">
              <option value="message">Message Agent</option>
              <option value="task">Create Task</option>
            </select>
            <select id="target-agent"></select>
            <input id="task-title" type="text" placeholder="Task title">
            <select id="review-agent"></select>
            <input id="depends-on" type="text" placeholder="Depends on task IDs (comma separated)">
            <textarea id="composer-input" rows="3" placeholder="Message or task description"></textarea>
            <button type="submit">Send</button>
          </form>
          <div id="human-input-panel" class="hidden"></div>
        </div>
      </div>

    </div>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
